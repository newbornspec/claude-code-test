<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    .container {
      text-align: center;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #e94560, #0f3460);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.8rem;
      color: #a8b2d8;
    }

    .status .highlight {
      color: #e94560;
      font-weight: bold;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
      margin: 0 auto 1.5rem;
      width: fit-content;
    }

    .cell {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 12px;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s, border-color 0.15s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      border-color: #e94560;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #4cc9f0; }

    .cell.win {
      background: #0f3460;
      border-color: #f9c74f;
      animation: pulse 0.6s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      from { box-shadow: 0 0 6px #f9c74f88; }
      to   { box-shadow: 0 0 18px #f9c74f; }
    }

    .cell.taken { cursor: default; }

    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      padding: 0.6rem 1.6rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    button:hover { opacity: 0.85; transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    #restartBtn {
      background: #e94560;
      color: #fff;
    }

    .mode-btn {
      background: #0f3460;
      color: #a8b2d8;
      border: 2px solid #0f3460;
    }

    .mode-btn.active {
      border-color: #4cc9f0;
      color: #4cc9f0;
    }

    .score {
      display: flex;
      gap: 24px;
      justify-content: center;
      margin-bottom: 1rem;
      font-size: 0.95rem;
      color: #a8b2d8;
    }

    .score span strong {
      font-size: 1.3rem;
    }

    .score .x-score strong { color: #e94560; }
    .score .o-score strong { color: #4cc9f0; }
    .score .tie-score strong { color: #f9c74f; }
  </style>
</head>
<body>
<div class="container">
  <h1>Tic Tac Toe</h1>
  <div class="score">
    <span class="x-score">X &nbsp;<strong id="scoreX">0</strong></span>
    <span class="tie-score">Ties &nbsp;<strong id="scoreTie">0</strong></span>
    <span class="o-score">O &nbsp;<strong id="scoreO">0</strong></span>
  </div>
  <div class="status" id="status">X's turn</div>
  <div class="board" id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>
  <div class="controls">
    <button class="mode-btn active" id="pvpBtn" onclick="setMode('pvp')">2 Players</button>
    <button class="mode-btn" id="aiBtn" onclick="setMode('ai')">vs CPU</button>
    <button id="restartBtn" onclick="restart()">Restart</button>
  </div>
</div>

<script>
  const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

  let board, current, gameOver, mode, scores;
  scores = { X: 0, O: 0, T: 0 };
  mode = 'pvp';

  function init() {
    board = Array(9).fill('');
    current = 'X';
    gameOver = false;
    document.querySelectorAll('.cell').forEach(c => {
      c.textContent = '';
      c.className = 'cell';
    });
    setStatus(`<span class="highlight">X</span>'s turn`);
  }

  function setStatus(html) {
    document.getElementById('status').innerHTML = html;
  }

  function setMode(m) {
    mode = m;
    document.getElementById('pvpBtn').classList.toggle('active', m === 'pvp');
    document.getElementById('aiBtn').classList.toggle('active', m === 'ai');
    restart();
  }

  function restart() { init(); }

  function cellClick(i) {
    if (gameOver || board[i]) return;
    if (mode === 'ai' && current === 'O') return;
    play(i);
    if (mode === 'ai' && !gameOver) {
      setTimeout(aiMove, 350);
    }
  }

  function play(i) {
    board[i] = current;
    const cell = document.querySelector(`[data-i="${i}"]`);
    cell.textContent = current;
    cell.classList.add('taken', current.toLowerCase());

    const win = checkWin(current);
    if (win) {
      win.forEach(idx => document.querySelector(`[data-i="${idx}"]`).classList.add('win'));
      scores[current]++;
      updateScores();
      setStatus(`<span class="highlight">${current}</span> wins!`);
      gameOver = true;
      return;
    }
    if (board.every(Boolean)) {
      scores.T++;
      updateScores();
      setStatus('Draw!');
      gameOver = true;
      return;
    }
    current = current === 'X' ? 'O' : 'X';
    setStatus(`<span class="highlight">${current}</span>'s turn`);
  }

  function checkWin(p) {
    for (const line of WINS) {
      if (line.every(i => board[i] === p)) return line;
    }
    return null;
  }

  function updateScores() {
    document.getElementById('scoreX').textContent = scores.X;
    document.getElementById('scoreO').textContent = scores.O;
    document.getElementById('scoreTie').textContent = scores.T;
  }

  function aiMove() {
    const move = bestMove();
    play(move);
  }

  function bestMove() {
    // Try to win
    for (let i = 0; i < 9; i++) {
      if (!board[i]) {
        board[i] = 'O';
        if (checkWin('O')) { board[i] = ''; return i; }
        board[i] = '';
      }
    }
    // Block X
    for (let i = 0; i < 9; i++) {
      if (!board[i]) {
        board[i] = 'X';
        if (checkWin('X')) { board[i] = ''; return i; }
        board[i] = '';
      }
    }
    // Center, then corners, then edges
    for (const i of [4, 0, 2, 6, 8, 1, 3, 5, 7]) {
      if (!board[i]) return i;
    }
  }

  document.getElementById('board').addEventListener('click', e => {
    const cell = e.target.closest('.cell');
    if (cell) cellClick(+cell.dataset.i);
  });

  init();
</script>
</body>
</html>
